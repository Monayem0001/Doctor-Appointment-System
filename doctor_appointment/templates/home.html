{% extends 'base.html' %}

{% block content %}

<div class="text-center">
    <h1 class="mb-4">Welcome to Doctor Appointment System</h1>

    {% if user.is_authenticated %}
        <div class="alert alert-success">
            Hello, {{ user.username }} 👋
        </div>
    {% else %}
        <div class="alert alert-warning">
            Please login or register to continue
        </div>
    {% endif %}
</div>

{% endblock %}
